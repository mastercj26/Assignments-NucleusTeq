<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Vehicle Rental System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
 
  <!-- White card in center -->
  <div class="auth-card">
 
    <div class="auth-logo">
      <div class="logo-circle">🚗</div>
      <h1>Create Account</h1>
      <p>Join us and start renting vehicles!</p>
    </div>
 
    <!-- Error or success message box -->
    <div id="message" class="message hidden"></div>
 
    <!-- Register Form -->
    <form id="registerForm">
 
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="username" placeholder="Enter your full name" />
        <small class="error-text" id="usernameError"></small>
      </div>
 
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <small class="error-text" id="emailError"></small>
      </div>
 
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Minimum 6 characters" />
          <span class="eye-btn" onclick="togglePassword('password')">👁</span>
        </div>
        <small class="error-text" id="passwordError"></small>
      </div>
 
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" placeholder="Repeat your password" />
          <span class="eye-btn" onclick="togglePassword('confirmPassword')">👁</span>
        </div>
        <small class="error-text" id="confirmPasswordError"></small>
      </div>
 
      <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
 
      <p class="switch-link">
        Already have an account? <a href="login.html">Login here</a>
      </p>
 
    </form>
  </div>
 
  <script src="js/auth.js"></script>
 
  <script>
    // If already logged in, no need to register again
    if (getToken()) {
      redirectByRole();
    }
 
    // When user submits the register form
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();
 
      clearErrors();
 
      // Read all fields
      const username        = document.getElementById("username").value.trim();
      const email           = document.getElementById("email").value.trim();
      const password        = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
 
      // Validate each field one by one
      let hasError = false;
 
      if (!username) {
        showFieldError("usernameError", "Please enter your name");
        hasError = true;
      } else if (username.length < 3) {
        showFieldError("usernameError", "Name must be at least 3 characters");
        hasError = true;
      }
 
      if (!email) {
        showFieldError("emailError", "Please enter your email");
        hasError = true;
      } else if (!isValidEmail(email)) {
        showFieldError("emailError", "Enter a valid email like abc@gmail.com");
        hasError = true;
      }
 
      if (!password) {
        showFieldError("passwordError", "Please enter a password");
        hasError = true;
      } else if (password.length < 6) {
        showFieldError("passwordError", "Password must be at least 6 characters");
        hasError = true;
      }
 
      if (!confirmPassword) {
        showFieldError("confirmPasswordError", "Please confirm your password");
        hasError = true;
      } else if (password !== confirmPassword) {
        showFieldError("confirmPasswordError", "Passwords do not match");
        hasError = true;
      }
 
      if (hasError) return;
 
      setLoading("registerBtn", true, "Creating account...");
 
      try {
        // Call the Spring Boot register API
        const response = await fetch("http://localhost:8080/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });
 
        const data = await response.json();
 
        if (response.ok) {
          // Save token and go to dashboard
          saveUser(data.token, data.role, data.username);
          showMessage("Account created successfully! Redirecting...", "success");
 
          setTimeout(() => redirectByRole(), 1000);
 
        } else {
          // Show backend error (like email already exists)
          showMessage(data.message || "Registration failed. Try again.", "error");
        }
 
      } catch (err) {
        showMessage("Server not reachable. Make sure backend is running on port 8080.", "error");
      }
 
      setLoading("registerBtn", false, "Create Account");
    });
  </script>
 
</body>
</html>
