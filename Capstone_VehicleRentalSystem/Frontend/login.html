<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Vehicle Rental System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">VR</div>
      <h1>Vehicle Rental</h1>
      <p>Welcome back. Please login.</p>
    </div>

    <div id="message" class="message hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <small class="error-text" id="emailError"></small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Enter your password" />
          <button type="button" class="eye-btn" onclick="togglePassword('password')">Show</button>
        </div>
        <small class="error-text" id="passwordError"></small>
      </div>

      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="USER">User</option>
          <option value="VEHICLE_OWNER">Vehicle Owner</option>
        </select>
        <small class="error-text" id="roleError"></small>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">Login</button>

      <p class="switch-link">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </form>
  </div>

  <script src="Auth.js"></script>
  <script>
    if (getToken()) {
      redirectByRole();
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const role = document.getElementById("role").value;
      let hasError = false;

      if (!email) {
        showFieldError("emailError", "Please enter your email");
        hasError = true;
      } else if (!isValidEmail(email)) {
        showFieldError("emailError", "Enter a valid email address");
        hasError = true;
      }

      if (!password) {
        showFieldError("passwordError", "Please enter your password");
        hasError = true;
      }

      if (!role) {
        showFieldError("roleError", "Please select your role");
        hasError = true;
      }

      if (hasError) return;

      setLoading("loginBtn", true, "Logging in...");

      try {
        const { response, data } = await authRequest("/api/auth/login", { email, password });

        if (response.ok) {
          if (data.role !== role) {
            showMessage("Selected role does not match your account role.", "error");
            return;
          }
          saveUser(data.token, data.role, data.username);
          showMessage("Login successful. Redirecting...", "success");
          setTimeout(() => redirectByRole(), 700);
        } else {
          showMessage(data.message || "Wrong email or password", "error");
        }
      } catch (err) {
        showMessage("Server not reachable. Start the backend on port 8080.", "error");
      } finally {
        setLoading("loginBtn", false, "Login");
      }
    });
  </script>
</body>
</html>
