<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... - Vehicle Rental System</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="logo-circle" style="margin-bottom: 20px;">VR</div>
    <p>Loading Vehicle Rental System...</p>
  </div>

  <script src="Auth.js"></script>
  <script>
    // Initial routing based on auth state
    window.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      if (!token) {
        window.location.href = "login.html";
      } else {
        redirectByRole();
      }
    });
  </script>
</body>
</html>
