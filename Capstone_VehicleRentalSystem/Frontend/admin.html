<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicle Owner Panel - Vehicle Rental System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Vehicle Rental - Vehicle Owner</div>
    <div class="navbar-right">
      <div class="navbar-user">Owner: <span id="navUsername"></span></div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main class="page-content">
    <div style="display:flex;gap:12px;margin-bottom:24px;">
      <button class="btn-primary" id="tabVehicles" style="width:auto;padding:10px 24px;" onclick="showTab('vehicles')">
        Manage Vehicles
      </button>
      <button class="btn-outline" id="tabBookings" onclick="showTab('bookings')">
        All Bookings
      </button>
    </div>

    <div id="message" class="message hidden"></div>

    <section id="sectionVehicles">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:16px;">
        <h2 class="page-title" style="margin:0;">All Vehicles</h2>
        <button class="btn-primary" style="width:auto;padding:10px 20px;" onclick="openAddModal()">Add Vehicle</button>
      </div>

      <div id="vehiclesGrid" class="vehicles-grid">
        <div class="loading">Loading vehicles...</div>
      </div>
    </section>

    <section id="sectionBookings" style="display:none;">
      <h2 class="page-title">All Bookings</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Vehicle</th>
              <th>Start</th>
              <th>End</th>
              <th>Price</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <tr><td colspan="7" class="loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="vehicleModal">
    <div class="modal">
      <h2 id="modalTitle">Add Vehicle</h2>

      <div id="modalMessage" class="message hidden"></div>

      <div class="form-group">
        <label>Vehicle Name</label>
        <input type="text" id="vName" placeholder="e.g. Honda City" />
        <small class="error-text" id="vNameError"></small>
      </div>

      <div class="form-group">
        <label>Type</label>
        <select id="vType" style="width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;">
          <option value="CAR">Car</option>
          <option value="BIKE">Bike</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="vDesc" placeholder="Short description" />
      </div>

      <div class="form-group">
        <label>Price per Day</label>
        <input type="number" id="vPrice" placeholder="e.g. 1500" min="0" step="0.01" />
        <small class="error-text" id="vPriceError"></small>
      </div>

      <div class="form-group">
        <label>Available?</label>
        <select id="vAvail" style="width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;">
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn-outline" onclick="closeVehicleModal()">Cancel</button>
        <button class="btn-primary" id="saveVehicleBtn" style="width:auto;padding:10px 24px;" onclick="saveVehicle()">Save</button>
      </div>
    </div>
  </div>

  <script src="Auth.js"></script>
  <script>
    requireVehicleOwner();
    document.getElementById("navUsername").textContent = getUsername();

    let editingVehicleId = null;
    let adminVehicles = [];

    function showTab(tab) {
      const vehiclesTab = tab === "vehicles";
      document.getElementById("sectionVehicles").style.display = vehiclesTab ? "block" : "none";
      document.getElementById("sectionBookings").style.display = vehiclesTab ? "none" : "block";
      document.getElementById("tabVehicles").className = vehiclesTab ? "btn-primary" : "btn-outline";
      document.getElementById("tabBookings").className = vehiclesTab ? "btn-outline" : "btn-primary";

      if (vehiclesTab) {
        loadVehicles();
      } else {
        loadAllBookings();
      }
    }

    async function loadVehicles() {
      document.getElementById("vehiclesGrid").innerHTML = '<div class="loading">Loading vehicles...</div>';

      try {
        const response = await apiCall("/api/vehicles");
        if (!response || !response.ok) {
          showMessage("Could not load vehicles.", "error");
          return;
        }

        adminVehicles = await response.json();

        if (adminVehicles.length === 0) {
          document.getElementById("vehiclesGrid").innerHTML =
            '<div class="empty-state"><p>No vehicles yet. Add one.</p></div>';
          return;
        }

        document.getElementById("vehiclesGrid").innerHTML = adminVehicles.map(buildAdminCard).join("");
      } catch (err) {
        showMessage("Server error while loading vehicles.", "error");
      }
    }

    function buildAdminCard(vehicle) {
      const availBadge = vehicle.isAvailable
        ? '<span class="badge badge-available">Available</span>'
        : '<span class="badge badge-unavailable">Unavailable</span>';

      return `
        <div class="vehicle-card">
          <div class="vehicle-card-icon">${vehicle.type}</div>
          <h3>${escapeHtml(vehicle.name)}</h3>
          <p>${escapeHtml(vehicle.description || "No description")}</p>
          <div class="vehicle-card-meta">
            <span class="vehicle-price">Rs. ${vehicle.pricePerDay}/day</span>
            <span class="badge badge-${vehicle.type.toLowerCase()}">${vehicle.type}</span>
          </div>
          ${availBadge}
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-outline" style="flex:1;" onclick="openEditModal(${vehicle.id})">Edit</button>
            <button class="btn-danger" style="flex:1;" onclick="deleteVehicle(${vehicle.id})">Delete</button>
          </div>
        </div>`;
    }

    function openAddModal() {
      editingVehicleId = null;
      document.getElementById("modalTitle").textContent = "Add New Vehicle";
      document.getElementById("vName").value = "";
      document.getElementById("vType").value = "CAR";
      document.getElementById("vDesc").value = "";
      document.getElementById("vPrice").value = "";
      document.getElementById("vAvail").value = "true";
      document.getElementById("modalMessage").className = "message hidden";
      document.getElementById("vehicleModal").classList.add("show");
    }

    function openEditModal(id) {
      const vehicle = adminVehicles.find(v => v.id === id);
      if (!vehicle) return;

      editingVehicleId = id;
      document.getElementById("modalTitle").textContent = "Edit Vehicle";
      document.getElementById("vName").value = vehicle.name;
      document.getElementById("vType").value = vehicle.type;
      document.getElementById("vDesc").value = vehicle.description || "";
      document.getElementById("vPrice").value = vehicle.pricePerDay;
      document.getElementById("vAvail").value = String(vehicle.isAvailable);
      document.getElementById("modalMessage").className = "message hidden";
      document.getElementById("vehicleModal").classList.add("show");
    }

    function closeVehicleModal() {
      document.getElementById("vehicleModal").classList.remove("show");
      editingVehicleId = null;
    }

    async function saveVehicle() {
      const name = document.getElementById("vName").value.trim();
      const type = document.getElementById("vType").value;
      const description = document.getElementById("vDesc").value.trim();
      const pricePerDay = Number(document.getElementById("vPrice").value);
      const isAvailable = document.getElementById("vAvail").value === "true";

      if (!name) {
        showModalMsg("Please enter a vehicle name", "error");
        return;
      }
      if (!Number.isFinite(pricePerDay) || pricePerDay <= 0) {
        showModalMsg("Please enter a valid price", "error");
        return;
      }

      setLoading("saveVehicleBtn", true, "Saving...");

      try {
        const body = { name, type, description, pricePerDay, isAvailable };
        const url = editingVehicleId ? "/api/vehicles/" + editingVehicleId : "/api/vehicles";
        const method = editingVehicleId ? "PUT" : "POST";
        const response = await apiCall(url, method, body);

        if (response && response.ok) {
          showModalMsg(editingVehicleId ? "Vehicle updated." : "Vehicle added.", "success");
          setTimeout(() => {
            closeVehicleModal();
            loadVehicles();
          }, 500);
        } else if (response) {
          const data = await response.json();
          showModalMsg(data.message || "Failed to save vehicle", "error");
        }
      } catch (err) {
        showModalMsg("Server error. Try again.", "error");
      }

      setLoading("saveVehicleBtn", false, "Save");
    }

    async function deleteVehicle(id) {
      const vehicle = adminVehicles.find(v => v.id === id);
      const name = vehicle ? vehicle.name : "this vehicle";
      if (!confirm("Delete vehicle: " + name + "? This cannot be undone.")) return;

      try {
        const response = await apiCall("/api/vehicles/" + id, "DELETE");

        if (response && response.ok) {
          showMessage("Vehicle deleted successfully.", "success");
          loadVehicles();
        } else {
          showMessage("Could not delete vehicle.", "error");
        }
      } catch (err) {
        showMessage("Server error.", "error");
      }
    }

    async function loadAllBookings() {
      try {
        const response = await apiCall("/api/bookings"); 
        if (!response || !response.ok) {
          showMessage("Could not load bookings.", "error");
          return;
        }

        const bookings = await response.json();
        const tbody = document.getElementById("bookingsBody");

        if (bookings.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No bookings yet</p></div></td></tr>';
          return;
        }

        tbody.innerHTML = bookings.map((booking, index) => {
          const badge = booking.status === "CONFIRMED"
            ? '<span class="badge badge-confirmed">Confirmed</span>'
            : '<span class="badge badge-cancelled">Cancelled</span>';

          return `
            <tr>
              <td>${index + 1}</td>
              <td>${escapeHtml(booking.username)}</td>
              <td>${escapeHtml(booking.vehicleName)}</td>
              <td>${booking.startDate}</td>
              <td>${booking.endDate}</td>
              <td><strong>Rs. ${booking.totalPrice}</strong></td>
              <td>${badge}</td>
            </tr>`;
        }).join("");
      } catch (err) {
        showMessage("Server error while loading bookings.", "error");
      }
    }

    function showModalMsg(text, type) {
      const box = document.getElementById("modalMessage");
      box.textContent = text;
      box.className = "message " + type;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadVehicles();
  </script>
</body>
</html>
