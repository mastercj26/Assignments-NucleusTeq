spring.application.name=vehicle-rental
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/vehicle_rental_db
spring.datasource.username=rental_user
spring.datasource.password=J7samsung@
spring.datasource.driver-class-name=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# App port
server.port=8080

# Logging
logging.level.com.rental=DEBUG
logging.level.org.springframework.security=DEBUG