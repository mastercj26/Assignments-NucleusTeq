# PR Review Agent Configuration

settings:
  max_comments_per_review: 15
  post_on_clean_pr: true
  excluded_files:
    - "*.md"
    - "*.lock"
    - "migrations/*"

rules:
  - id: no_hardcoded_secrets
    enabled: true
    severity: SECURITY
    title: No hardcoded secrets or credentials
    details: >
      Flag any hardcoded API keys, passwords, tokens, or connection strings.
      The fix must use an environment variable reference instead.
  
  - id: branch_empty
    enabled: true
    severity: CODE_QUALITY
    title: There is No Code or Low Code, or Syntax not Found
    details: >
      There is no code or very minimal code on the branch suggesting that the Coder has not completed or done the task.

  - id: no_print_statements
    enabled: true
    severity: CODE_QUALITY
    title: No print() in production code
    details: >
      Flag any print() calls in non-test files.
      Replace with the project logger at the appropriate log level.

  - id: syntax_error
    enabled: true
    severity: SYNTAX_ERROR
    title: Syntax Error in Code
    details: >
      There is Syntax Error in The Code.
